# UGV 串口、相机、数据集参数配置

# --- 串口配置 ---
serial:
  # ESP32 通过 USB 连接时出现 /dev/ttyACM0（USB-CDC）；GPIO UART 才用 /dev/ttyTHS1
  port: "/dev/ttyCH341USB0"
  #port: "/dev/ttyTHS1"    # 原始值：GPIO 硬件 UART（悬空时收到全零）

  baud: 115200
  timeout: 1.0
  # 底盘物理参数（用于从里程计增量计算速度反馈）
  wheel_base: 0.172        # 轮距/轨道宽度（m）——来自 ESP32 固件 TRACK_WIDTH（UGV Rover main_type:02）
  wheel_radius: 0.040      # 轮半径（m）——来自 ESP32 固件 WHEEL_D/2 = 0.080/2（目前 Python 侧暂未使用，ESP32 已转换）
  ticks_per_rev: 1650      # 编码器每圈脉冲数（halfQuad）——来自 ESP32 固件 ONE_CIRCLE_PLUSES（目前暂未使用）

# --- 摄像头配置 ---
camera:
  index: 0                 # /dev/video1 (USB Camera)
  width: 640
  height: 480
  fps: 30

# --- 键盘遥控参数 ---
teleop:
  max_linear: 0.5          # 最大线速度（m/s）
  max_angular: 1.5         # 最大角速度（rad/s）
  # 速度档位列表（实际速度 = max * scale）
  speed_scales: [0.1, 0.2, 0.3, 0.5, 0.7, 1.0]
  default_scale_idx: 1    # 默认第 2 档（0.2）

# --- LeRobot 数据集配置 ---
dataset:
  # 格式：{hf_username}/{dataset_name}
  repo_id: "myusername/ugv-follow-task"
  single_task: "Follow the person in front of the robot"
  output_dir: "./datasets"
  num_episodes: 20
  episode_time_s: 30
  reset_time_s: 10
  fps: 30
  push_to_hub: false
